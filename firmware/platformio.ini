[env:waveshare_amoled_216]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; NimBLE config — peripheral, 2 simultaneous connections so the OS can
    ; hold the HID link (Space key from BOOT button) while the daemon holds
    ; its own connection for the custom data service.
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

[env:generic_esp32]
platform = platformio/espressif32@7.0.1
board = esp32dev
framework = arduino
upload_speed = 921600
upload_port = COM4
monitor_speed = 115200

build_src_filter =
    -<*>
    +<main_generic.cpp>

build_flags =
    -DCLAWDMETER_GENERIC_ESP32
    -DCLAWDMETER_LED_PIN=2

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    olikraus/U8g2@^2.36.5
